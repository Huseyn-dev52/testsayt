<!DOCTYPE html>
<html>
  <head>
  <style>
     body{
          background:white;
          font-family:Arial;
          text-align:center;
          font-size:25px;
          color:green;
          text-shadow: 0 0 10px green,0 0 20px green;
           }
     button{
            background:black;
            color:red;
            font-size: 20px;
     }
  </style>
  <title>Elanbaku.az</title>
    
  </head>
  <body>
    <h1 id="basliq">Elanbaku.az</h1>
    <p>al-sat-iş tap-iş qur</p>
    <input id="elanyazısı" type="text">
    <button id="elan">Elan Əlavə Et</button>
    <h2>Qeydiyyat</h2>

<input id="ad" placeholder="Ad">
<input id="gmail" placeholder="Gmail">
<input id="sifre" type="password" placeholder="Şifrə">
<button id="qeydiyyat">Qeydiyyatdan keç</button>
<p id="cavab"></p>
    <p id="mesaj"></p>
  
<script>
      document.getElementById("elan").style.background = "black";
      document.getElementById("elan").onclick=function(){document.getElementById("mesaj").innerHTML="mesaj";
        document.getElementById("mesaj").style.color = "red";
        document.getElementById("basliq").innerHTML="yeni elanlar"
       let elan=document.getElementById("elanyazısı").value;
       document.getElementById("mesaj").innerHTML=elan;
      }
      document.getElementById("qeydiyyat").onclick = function(){

let ad = document.getElementById("ad").value;
let gmail = document.getElementById("gmail").value;
let sifre = document.getElementById("sifre").value;

fetch("http://localhost:3000/qeydiyyat", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        ad: ad,
        gmail: gmail,
        sifre: sifre
    })
})

.then(cavab => cavab.json())

.then(data => {
    document.getElementById("cavab").innerHTML = data.mesaj;
});

}
</script>
  </body>
</html>
